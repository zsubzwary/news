<script>
(function() {
  const themeToggle = document.getElementById('theme-toggle');
  const STORAGE_KEY = 'news-briefing-theme';
  
  const THEMES = {
    light: '☀️',
    dark: '🌙'
  };
  
  function getSystemTheme() {
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  
  function getStoredTheme() {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored || 'auto';
  }
  
  function getEffectiveTheme() {
    const stored = getStoredTheme();
    return stored === 'auto' ? getSystemTheme() : stored;
  }
  
  function applyTheme(theme) {
    const effectiveTheme = theme === 'auto' ? getSystemTheme() : theme;
    document.documentElement.setAttribute('data-theme', effectiveTheme);
    if (themeToggle) {
      themeToggle.textContent = THEMES[effectiveTheme];
    }
  }
  
  function rotateTheme() {
    const currentTheme = getStoredTheme();
    const effectiveTheme = getEffectiveTheme();
    
    let nextTheme;
    if (currentTheme === 'auto') {
      nextTheme = effectiveTheme === 'light' ? 'dark' : 'light';
    } else {
      nextTheme = 'auto';
    }
    
    localStorage.setItem(STORAGE_KEY, nextTheme);
    applyTheme(nextTheme);
  }
  
  function init() {
    const storedTheme = getStoredTheme();
    applyTheme(storedTheme);
    
    if (themeToggle) {
      themeToggle.addEventListener('click', rotateTheme);
    }
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      const stored = getStoredTheme();
      if (stored === 'auto') {
        applyTheme('auto');
      }
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

(function() {
  const langSwitcher = document.querySelector('.lang-switcher');
  const langToggle = document.getElementById('lang-toggle');
  const langDropdown = document.getElementById('lang-dropdown');
  const LANG_STORAGE_KEY = 'news-briefing-lang';
  
  function toggleDropdown() {
    if (!langSwitcher) return;
    const isOpen = langSwitcher.classList.toggle('open');
    if (langToggle) {
      langToggle.setAttribute('aria-expanded', isOpen);
    }
  }
  
  function closeDropdown() {
    if (!langSwitcher) return;
    langSwitcher.classList.remove('open');
    if (langToggle) {
      langToggle.setAttribute('aria-expanded', 'false');
    }
  }
  
  function handleLangClick(e) {
    const target = e.target.closest('.lang-option');
    if (!target) return;
    
    const lang = target.getAttribute('data-lang');
    if (lang) {
      localStorage.setItem(LANG_STORAGE_KEY, lang);
    }
  }
  
  function handleClickOutside(e) {
    if (langSwitcher && !langSwitcher.contains(e.target)) {
      closeDropdown();
    }
  }
  
  function handleKeydown(e) {
    if (e.key === 'Escape') {
      closeDropdown();
    }
  }
  
  function init() {
    if (!langSwitcher || !langToggle) return;
    
    langToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDropdown();
    });
    
    if (langDropdown) {
      langDropdown.addEventListener('click', handleLangClick);
    }
    
    document.addEventListener('click', handleClickOutside);
    document.addEventListener('keydown', handleKeydown);
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
