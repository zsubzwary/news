<!DOCTYPE html>
<html lang="{{ page.lang | default: "en-US" }}" {% if page.rtl %}dir="rtl"{% endif %}>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="search-data-url" content="{{ site.baseurl }}/assets/data/search_{{ page.lang | default: 'en' }}.json">

    {% include deakh.html %}

    <!-- Google Fonts for Urdu Nastaliq -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

    <!-- Custom font from frontmatter if provided -->
    {% if page.font_url %}
    <link rel="stylesheet" href="{{ page.font_url }}">
    {% endif %}

    {% include style.html %}
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>{{ page.title | default: site.title }}</h1>
        <div class="search-container">
          <div class="search-input-wrapper">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="{% if page.lang == 'ur' %}تلاش کرن...{% else %}Search news...{% endif %}" aria-label="Search" autocomplete="off">
            <button type="button" class="search-clear" id="search-clear" aria-label="Clear search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
          <div id="search-results" class="search-results">
            <div class="search-loading" id="search-loading">
              <div class="spinner"></div>
              <span>{% if page.lang == 'ur' %}تلاش ہو رہی ہے...{% else %}Searching...{% endif %}</span>
            </div>
            <div class="search-content" id="search-content"></div>
          </div>
        </div>
      </div>
      <div class="header-controls">
        <div class="lang-switcher">
          <button id="lang-toggle" class="lang-toggle" aria-label="Switch language" aria-expanded="false">
            <span class="lang-icon">🌐</span>
            <span class="lang-current">{% if page.lang == 'ur' %}اردو{% else %}English{% endif %}</span>
            <span class="lang-arrow">▾</span>
          </button>
          <div class="lang-dropdown" id="lang-dropdown">
            <a href="{{ site.baseurl }}/en/" class="lang-option{% if page.lang == 'en' %} active{% endif %}" data-lang="en">English</a>
            <a href="{{ site.baseurl }}/ur/" class="lang-option{% if page.lang == 'ur' %} active{% endif %}" data-lang="ur">اردو</a>
          </div>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🔄</button>
      </div>
    </header>

    <main>
      <div class="briefing-container">
        {{ content }}
      </div>
    </main>

    <footer>
      <p>Made with ❤️ in 🇵🇰 Pakistan</p>
    </footer>


    {% include theme.html %}
    <script src="https://unpkg.com/lunr/lunr.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/search.js"></script>
  </body>
</html>
